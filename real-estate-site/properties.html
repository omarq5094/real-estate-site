<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>العقارات | مكتب التسويق العقاري</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <h1 class="logo">مكتب التسويق العقاري</h1>
      <nav>
        <a href="index.html">الرئيسية</a>
        <a href="properties.html" class="active">العقارات</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-hero">
      <h2>العقارات المتاحة</h2>
      <p>استعرض الأراضي والعقارات المتاحة حاليًا.</p>
    </section>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="ابحث باسم العقار أو المدينة أو الحي" />
      <select id="categoryFilter">
        <option value="">كل الأنواع</option>
        <option value="أرض">أرض</option>
        <option value="فيلا">فيلا</option>
        <option value="شقة">شقة</option>
        <option value="عمارة">عمارة</option>
      </select>
    </section>

    <section id="loadingMessage" class="status-box">جاري تحميل العقارات...</section>
    <section id="errorMessage" class="status-box error hidden">حدث خطأ أثناء تحميل البيانات.</section>

    <section id="propertiesContainer" class="properties-grid"></section>
  </main>

  <script src="assets/js/properties.js"></script>
</body>
</html>
