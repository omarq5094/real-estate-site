<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الشروط والأحكام</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">

        <p id="termsIntro">يرجى قراءة الشروط قبل إنشاء الحساب.</p>
      </div>
      <nav class="nav">
        <a href="register.html">رجوع للتسجيل</a>
        <a href="index.html">الرئيسية</a>
        <button class="theme-toggle" data-theme-toggle type="button">🌙 Dark</button>

    </div>

  <main class="container">
    <section class="terms-card">
      <div class="terms-meta">

      <div class="terms-accept-box">
        <strong>نص الموافقة:</strong>
        <p id="termsAcceptanceText"></p>
      </div>

      <div class="actions">
        <a class="primary-btn" href="register.html">العودة للتسجيل</a>
      </div>
    </section>
  </main>

  <script src="theme.js"></script>
  <script src="terms-content.js"></script>
  <script src="terms.js"></script>
  <script src="image-lightbox.js"></script>
</body>
</html>
