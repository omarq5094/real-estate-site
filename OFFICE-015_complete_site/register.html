<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>تسجيل حساب جديد</title><link rel="stylesheet" href="styles.css"/></head>
<body>
<header class="site-header"><div class="container header-grid"><div><h1>تسجيل حساب جديد</h1><p>أنشئ حساب عميل لإضافة عقاراتك ومتابعتها.</p></div><nav class="nav"><a href="index.html">الرئيسية</a><a href="login.html">دخول</a><button class="theme-toggle" data-theme-toggle type="button">🌙 Dark</button></nav></div></header>
<main class="container auth-page"><form id="registerForm" class="form-card auth-card">
<span class="badge">Register</span><h2>حساب عميل</h2>
<div class="form-grid">
<label>الاسم<input name="name" required placeholder="اسم العميل"/></label>
<label>الجوال<input name="phone" required placeholder="05xxxxxxxx"/></label>
<label>البريد الإلكتروني<input name="email" type="email" required placeholder="email@example.com"/></label>
<label>كلمة المرور
          <div class="password-wrap">
            <input id="registerPassword" name="password" type="password" required minlength="6" placeholder="6 أحرف على الأقل"/>
            <button type="button" class="password-eye" onclick="togglePasswordVisibility('registerPassword', this)" aria-label="إظهار كلمة المرور">👁️</button>
          </div>
        </label>
</div>
<label class="terms-checkbox">
        <input name="terms_accepted" type="checkbox" value="yes" />
        <span>
          أقر بأنني قرأت ووافقت على
          <a href="terms.html" target="_blank" rel="noopener">عرض الشروط والأحكام</a>
          وسياسة استخدام الصور.
        </span>
      </label>

      <button class="primary-btn" type="submit">إنشاء الحساب</button>
<div id="registerStatus" class="status-box hidden"></div>
<p class="meta">لديك حساب؟ <a class="inline-link" href="login.html">سجل الدخول</a></p>
</form></main>
<script src="theme.js"></script><script src="config.js"></script>
  <script src="subscription-guard.js"></script>
  <script src="site-config.js"></script>
  <script src="site-settings.js"></script><script src="auth.js"></script><script src="password-toggle.js"></script><script src="register.js"></script>
  <script src="image-lightbox.js"></script>
</body></html>
